language: fr
normalization:
  lowercase: true
  strip_accents: true
  collapse_whitespace: true
  normalize_apostrophes: true
  normalize_dashes: true
fuzzy:
  enabled: true
  similarity_threshold: 88
  max_ngram_length_delta: 1
linguistics:
  spacy_model: fr_core_news_md
semantic:
  enabled: true
  model_name: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  similarity_threshold: 0.62
scoring:
  alert_threshold: 0.75
  review_threshold: 0.45
  method_weights:
    lexical: 0.40
    fuzzy: 0.25
    linguistic: 0.20
    semantic: 0.30
    presidio: 0.15
categories:
  - key: RELIGION_BELIEF
    label: Religion ou convictions
    description: Indices de religion, conviction ou pratique confessionnelle.
    terms:
      - religion
      - convictions religieuses
      - croyance
      - croyant
      - croyante
      - foi
      - pratique religieuse
      - tres croyante
      - tres croyant
    synonyms:
      - paroisse
      - eglise
      - mosquee
      - synagogue
      - temple
      - imam
      - cure
      - pasteur
      - judaisme
      - christianisme
      - islam
      - catholicisme
      - protestantisme
    context_terms:
      - conseil
      - beneficiaire
      - commentaire
      - convictions
      - religion
      - culte
      - priere
    field_hints:
      - conseil
      - beneficiaire
      - commentaire
      - observations
    semantic_anchors:
      - personne tres croyante
      - pratique religieuse reguliere
      - appartenance confessionnelle
      - convictions religieuses fortes
      - vie paroissiale
    thresholds:
      alert: 0.74
      review: 0.42
  - key: HEALTH_DATA
    label: Donnees de sante
    description: Indices de pathologie, traitement, incapacite ou questionnaire medical.
    terms:
