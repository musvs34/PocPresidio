      - antecedent
      - pathologie
      - traitement
      - hospitalisation
      - invalidite
      - incapacite
      - diabete
      - cancer
      - vih
      - depression
    synonyms:
      - ald
      - arret de travail
      - affection longue duree
      - suivi medical
      - tension arterielle
      - maladie chronique
      - handicap
    context_terms:
      - medical
      - sante
      - selection medicale
      - expertise medicale
      - declaration de sante
      - souscription
    field_hints:
      - conseil
      - questionnaire
      - observations
      - beneficiaire
    semantic_anchors:
      - situation de sante fragile
      - traitement medical en cours
      - antecedents medicaux significatifs
      - suivi hospitalier
    thresholds:
      alert: 0.78
      review: 0.48
  - key: SEXUAL_ORIENTATION
    label: Orientation sexuelle ou vie sexuelle
